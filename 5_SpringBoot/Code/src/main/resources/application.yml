#url最后的名字跟数据库名字一样

#  yml是一种写配置的格式，你只需要掌握它的语法规则，不需要学什么原理。
#  规则就三条：
#  1. 用缩进表示层级，不能用Tab，只能用空格
#  mainspring:
#  datasource:
#    url: jdbc:mysql://localhost:3306/customer
#  这就是 spring → datasource → url 三层嵌套。
#  2. 冒号后面必须有空格
#  username: root   # 对
#  username:root    # 错
#  3. 值直接写，字符串不需要加引号
#  password: 123456

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/customers
    username: root
    password: kjyoui77
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect